services:
  ipx800-mqtt:
    image: chrisb777/ipx800_v3_to_mqtt:v1.0.0
    container_name: ipx800-mqtt
    ports:
      - "8080:8080"
    environment:
      - IPX800_HOST=${IPX800_HOST:-192.168.1.12}
      - IPX800_PORT=${IPX800_PORT:-80}
      - IPX800_USERNAME=${IPX800_USERNAME}
      - IPX800_PASSWORD=${IPX800_PASSWORD}
      - MQTT_BROKER_HOST=${MQTT_BROKER_HOST:-192.168.1.24}
      - MQTT_BROKER_PORT=${MQTT_BROKER_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - MQTT_TOPIC_PREFIX=${MQTT_TOPIC_PREFIX:-ipx800}
      - POLLING_INTERVAL=${POLLING_INTERVAL:-30}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
